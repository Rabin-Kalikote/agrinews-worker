<!DOCTYPE html>
<html lang="ne">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgriNews</title>
  <link rel="stylesheet" type="text/css" href="static/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
          <a class="navbar-brand" href="/">
            <span class='green'>Agri</span> News
          </a>
        </div>
    </nav>

    <div class='container main-content'>
        <div class='motto-search'>
            <h1>Agriculture News for Nepalese Farmers</h1>
            <form id="search-form">
              <input type="text" id="query" placeholder="Search for news...">
              <button type="submit">Search</button>
            </form>
        </div>

        <div id="articles-container" class="articles">
            <p class="text-center">Loading latest agriculture news...</p>
        </div>
    </div>

    <footer>
        <p>2026 AgriNews</p>
    </footer>

    <script>
        async function loadNews(query = '') {
            const container = document.getElementById('articles-container');
            // REPLACE THIS URL with your actual Worker URL after deploying
            const apiUrl = query ? `/api/news?query=${encodeURIComponent(query)}` : '/api/news';
            
            try {
                const response = await fetch(apiUrl);
                const articles = await response.json();
                
                if (articles.length === 0) {
                    container.innerHTML = '<p class="text-center">No news found.</p>';
                    return;
                }

                container.innerHTML = articles.map(article => `
                    <div class='article mb-4 pb-3 border-bottom'>
                        <div class="content-image row flex-column-reverse flex-md-row">
                          <div class='content col-12 col-md-8 mt-3 mt-md-0 d-flex flex-column justify-content-center'>
                            <h2><a href="${article.article_url}" target="_blank">${article.headline}</a></h2>
                            <p>${article.description || ''}</p>
                            <div class='article-meta mt-2'>
                              ${article.date ? `<p class="date mb-0">${article.date}</p>` : ''}
                              <span class="source fw-bold">${article.source}</span>
                            </div>
                          </div>
                          ${article.image_url ? `
                          <div class="col-12 col-md-4">
                            <img class="img-fluid rounded w-100 object-fit-cover" style="max-height: 220px;" src="${article.image_url}" alt="${article.headline}">
                          </div>` : ''}
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                container.innerHTML = '<p class="text-center text-danger">Error loading news.</p>';
            }
        }

        document.getElementById('search-form').onsubmit = (e) => {
            e.preventDefault();
            const query = document.getElementById('query').value;
            // Update URL without reloading
            const newUrl = query ? `/?query=${encodeURIComponent(query)}` : '/';
            window.history.pushState({ path: newUrl }, '', newUrl);
            loadNews(query);
        };

        // Initial load
        const urlParams = new URLSearchParams(window.location.search);
        const initialQuery = urlParams.get('query') || '';
        if (initialQuery) {
            document.getElementById('query').value = initialQuery;
        }
        loadNews(initialQuery);
    </script>
</body>
</html>
